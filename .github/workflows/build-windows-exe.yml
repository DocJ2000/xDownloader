name: Build Windows exe

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Inno Setup
        shell: pwsh
        # build_windows_exe.ps1 calls ISCC to create the installer.
        run: choco install innosetup --yes --no-progress

      - name: Build exe
        shell: pwsh
        run: ./packaging/build_windows_exe.ps1 -Version "${{ github.ref_name }}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: xDownloader-windows
          path: |
            release/xDownloader-*-windows.zip
            release/xDownloader-Setup-*.exe

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/xDownloader-*-windows.zip
            release/xDownloader-Setup-*.exe
