<!DOCTYPE html>
<html lang="en" data-theme="dark-glass">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>X-Download</title>
<style>
/* ===== CSS Variables: Dark Glass ===== */
[data-theme="dark-glass"] {
    --bg: #0a0a0f;
    --panel: rgba(18,18,24,0.9);
    --card: rgba(25,25,35,0.6);
    --card-hover: rgba(32,32,45,0.8);
    --text: #e0e0e0;
    --text-dim: #888;
    --text-muted: #555;
    --accent: #6c5ce7;
    --accent-glow: #a29bfe;
    --border: rgba(255,255,255,0.06);
    --border-strong: rgba(255,255,255,0.1);
    --radius: 12px;
    --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
    --font-mono: 'Cascadia Code', 'Fira Code', monospace;
    --scrollbar-track: transparent;
    --scrollbar-thumb: rgba(255,255,255,0.1);
    --red: #ff6b6b;
    --green: #51cf66;
    --yellow: #ffd43b;
}
[data-theme="dark-glass"] body { backdrop-filter: blur(2px); }
[data-theme="dark-glass"] .nav-panel, [data-theme="dark-glass"] .header-bar { backdrop-filter: blur(16px); }

/* ===== CSS Variables: Magazine ===== */
[data-theme="magazine"] {
    --bg: #faf8f5;
    --panel: #ffffff;
    --card: #ffffff;
    --card-hover: #f5f2ed;
    --text: #1a1a1a;
    --text-dim: #6b6b6b;
    --text-muted: #b0ada5;
    --accent: #c49a2b;
    --accent-glow: #8b6914;
    --border: #e8e4dd;
    --border-strong: #d4cfc6;
    --radius: 4px;
    --font: 'Georgia', 'Noto Serif SC', serif;
    --font-mono: 'Courier New', monospace;
    --scrollbar-track: #faf8f5;
    --scrollbar-thumb: #d4cfc6;
    --red: #c92a2a;
    --green: #2b8a3e;
    --yellow: #e67700;
}
[data-theme="magazine"] body { background: var(--bg); }

/* ===== Reset ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    overflow: hidden;
}

/* ===== Scrollbar ===== */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: var(--scrollbar-track); }
::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

/* ===== Layout ===== */
.nav-panel {
    width: 76px; min-width: 76px;
    background: var(--panel);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column; align-items: center;
    padding: 12px 0; gap: 4px;
    z-index: 2;
}
.nav-icon {
    width: 62px; height: 42px;
    display: flex; align-items: center; justify-content: center;
    border-radius: var(--radius);
    font-size: 12px; cursor: pointer; transition: all 0.15s;
    color: var(--text-dim); position: relative;
    font-weight: 700;
    line-height: 1.2;
    text-align: center;
}
.nav-label { display: block; max-width: 54px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.nav-icon:hover { background: var(--card); color: var(--text); }
.nav-icon.active { color: var(--accent); background: var(--card); }
.nav-icon .tooltip {
    position: absolute; left: 56px; top: 50%; transform: translateY(-50%);
    background: var(--text); color: var(--bg); font-size: 12px; padding: 4px 8px;
    border-radius: 4px; white-space: nowrap; pointer-events: none; opacity: 0;
    transition: opacity 0.1s; font-family: 'Segoe UI', sans-serif;
}
.nav-icon:hover .tooltip { opacity: 1; }
.nav-bottom { margin-top: auto; display: flex; flex-direction: column; align-items: center; gap: 4px; }
.language-toggle {
    width: 62px; height: 30px; border: 1px solid var(--border);
    border-radius: 999px; background: var(--card); color: var(--text);
    font-size: 12px; font-weight: 800; cursor: pointer;
}
.language-toggle:hover { background: var(--card-hover); color: var(--accent); }
.nav-stats { font-size: 10px; color: var(--text-muted); text-align: center; line-height: 1.4; padding: 8px 0; }

.main-area {
    flex: 1; display: flex; flex-direction: column; min-width: 0;
}
.header-bar {
    height: 48px; min-height: 48px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; padding: 0 16px; gap: 12px;
}
.header-bar input {
    flex: 1; max-width: 400px; height: 32px;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 16px; padding: 0 14px; font-size: 13px;
    color: var(--text); outline: none; font-family: var(--font);
}
.header-bar input:focus { border-color: var(--accent); }
.header-bar input::placeholder { color: var(--text-muted); }
.tab-title { font-size: 14px; font-weight: 600; color: var(--text); white-space: nowrap; }
.config-badge {
    flex: 0 0 auto; display: inline-flex; align-items: center; gap: 8px;
    height: 32px; padding: 0 12px; border: 1px solid var(--border);
    border-radius: 999px; background: var(--card); color: var(--text);
    font-size: 12px; font-weight: 700; cursor: pointer; white-space: nowrap;
}
.config-badge.ready { color: var(--green); border-color: rgba(81,207,102,0.35); }
.config-badge.warn { color: var(--yellow); border-color: rgba(255,212,59,0.35); }
.config-badge:hover { background: var(--card-hover); }

.content-area {
    flex: 1; overflow: hidden; position: relative;
}
.tab-content { display: none; height: 100%; overflow-y: auto; padding: 0; }
.tab-content.active { display: flex; flex-direction: column; }

/* ===== Utilities ===== */
.btn {
    padding: 8px 16px; border-radius: var(--radius); border: none; cursor: pointer;
    font-size: 13px; font-family: var(--font); font-weight: 600;
    transition: all 0.15s;
}
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { filter: brightness(1.1); }
.btn-secondary { background: var(--card); color: var(--text); border: 1px solid var(--border); }
.btn-secondary:hover { background: var(--card-hover); }
.btn-danger { background: var(--red); color: #fff; }
.btn:disabled { opacity: 0.45; cursor: not-allowed; }

.empty-state { padding: 48px 24px; text-align: center; color: var(--text-dim); font-size: 14px; }
.spinner {
    width: 28px; height: 28px; border: 3px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin 0.7s linear infinite; margin: 0 auto 12px;
}
@keyframes spin { to { transform: rotate(360deg); } }

.skeleton { background: linear-gradient(90deg, var(--card) 25%, var(--card-hover) 50%, var(--card) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: var(--radius); }
@keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }

/* ===== Home Dashboard ===== */
.home-layout { padding: 18px; display: flex; flex-direction: column; gap: 14px; }
.home-hero {
    display: grid; grid-template-columns: minmax(0, 1.3fr) minmax(280px, 0.7fr);
    gap: 14px; align-items: stretch;
}
.home-panel {
    background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 16px; min-width: 0;
}
.home-title { font-size: 22px; font-weight: 800; margin-bottom: 6px; }
.home-subtitle { color: var(--text-dim); line-height: 1.5; font-size: 13px; max-width: 760px; }
.home-actions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 14px; }
.home-grid { display: grid; grid-template-columns: repeat(4, minmax(130px, 1fr)); gap: 10px; }
.metric-card {
    background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 14px; min-height: 92px;
}
.metric-label { font-size: 12px; color: var(--text-dim); margin-bottom: 10px; }
.metric-value { font-size: 24px; font-weight: 800; color: var(--text); }
.metric-note { margin-top: 6px; font-size: 12px; color: var(--text-muted); }
.home-columns { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.compact-list { display: flex; flex-direction: column; gap: 8px; }
.compact-row {
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
    padding: 9px 0; border-bottom: 1px solid var(--border);
}
.compact-row:last-child { border-bottom: none; }
.compact-title { font-weight: 700; color: var(--text); font-size: 13px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.compact-meta { color: var(--text-dim); font-size: 12px; margin-top: 3px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.compact-value { color: var(--accent-glow); font-weight: 700; font-size: 12px; white-space: nowrap; }
.health-good { color: var(--green); }
.health-warn { color: var(--yellow); }
.shortcut-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 8px; margin-top: 12px; }
.shortcut-key {
    border: 1px solid var(--border); background: var(--panel); border-radius: var(--radius);
    padding: 8px; font-size: 12px; color: var(--text-dim);
}
.shortcut-key strong { display: block; color: var(--text); font-size: 13px; margin-bottom: 3px; }

/* ===== Form ===== */
.form-group { margin-bottom: 14px; }
.form-group label { display: block; font-size: 12px; font-weight: 600; color: var(--text-dim); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
.form-group input, .form-group select, .form-group textarea {
    width: 100%; padding: 8px 12px; border-radius: 6px; border: 1px solid var(--border);
    background: var(--card); color: var(--text); font-size: 13px;
    font-family: var(--font); outline: none;
}
.form-group input:focus, .form-group textarea:focus { border-color: var(--accent); }
.form-group textarea { min-height: 120px; resize: vertical; font-family: var(--font-mono); font-size: 12px; }
.form-group input[type="checkbox"] { width: auto; margin-right: 6px; }
.form-group .checkbox-label { text-transform: none; letter-spacing: 0; display: inline; }
.form-row { display: flex; gap: 12px; }
.form-row .form-group { flex: 1; }
.form-section { margin-bottom: 24px; }
.form-section h3 { font-size: 14px; font-weight: 600; margin-bottom: 12px; padding-bottom: 6px; border-bottom: 1px solid var(--border); color: var(--accent); }

/* ===== Badge ===== */
.badge {
    display: inline-block; padding: 1px 6px; border-radius: 10px; font-size: 10px;
    font-weight: 600; font-family: 'Segoe UI', sans-serif;
}
.badge-media { background: var(--accent); color: #fff; }
.badge-tweet { background: var(--card); color: var(--text-dim); border: 1px solid var(--border); }

/* ===== Toast ===== */
.toast {
    position: fixed; bottom: 24px; right: 24px; z-index: 1000;
    padding: 12px 20px; border-radius: var(--radius); font-size: 13px;
    font-weight: 600; opacity: 0; transform: translateY(12px);
    transition: all 0.3s; pointer-events: none;
}
.toast.show { opacity: 1; transform: translateY(0); }
.toast.success { background: var(--green); color: #fff; }
.toast.error { background: var(--red); color: #fff; }

/* ===== Modal ===== */
.modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 100;
    display: none; align-items: center; justify-content: center;
}
.modal-overlay.show { display: flex; }
.modal-overlay img, .modal-overlay video {
    max-width: 95vw; max-height: 95vh; object-fit: contain; border-radius: 8px;
}
.modal-close {
    position: fixed; top: 16px; right: 24px; width: 40px; height: 40px;
    border-radius: 50%; background: rgba(255,255,255,0.1); color: #fff;
    font-size: 24px; display: flex; align-items: center; justify-content: center;
    cursor: pointer; z-index: 101; border: none;
}

/* ===== Tag input ===== */
.tag-input-wrap {
    display: flex; flex-wrap: wrap; gap: 4px; padding: 6px;
    border: 1px solid var(--border); border-radius: 6px; background: var(--card);
    min-height: 36px; align-items: center; cursor: text;
}
.tag-input-wrap:focus-within { border-color: var(--accent); }
.tag-input-wrap input { border: none; background: none; outline: none; flex: 1; min-width: 80px; padding: 2px 4px; color: var(--text); font-size: 13px; }
.tag {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 2px 8px; border-radius: 10px; font-size: 12px;
    background: var(--accent); color: #fff; line-height: 1.5;
}
.tag .remove { cursor: pointer; font-weight: 700; font-size: 14px; opacity: 0.7; }
.tag .remove:hover { opacity: 1; }

/* ===== Browse Tab ===== */
.browse-layout { display: flex; height: 100%; }
.user-sidebar {
    width: 240px; min-width: 240px;
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column; overflow: hidden;
}
.user-sidebar-search { padding: 8px; border-bottom: 1px solid var(--border); }
.user-sidebar-search input {
    width: 100%; padding: 6px 10px; border-radius: 14px; border: 1px solid var(--border);
    background: var(--card); color: var(--text); font-size: 12px; outline: none;
}
.user-sidebar-search input:focus { border-color: var(--accent); }
.user-list-scroll { flex: 1; overflow-y: auto; }
.user-row {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 10px; cursor: pointer; transition: background 0.1s;
    border-bottom: 1px solid var(--border);
}
.user-row:hover { background: var(--card-hover); }
.user-row.active { background: var(--card); border-left: 3px solid var(--accent); }
.user-avatar {
    width: 34px; height: 34px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 700; color: #fff; flex-shrink: 0;
}
.user-row-info { flex: 1; min-width: 0; }
.user-row-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.user-row-handle { font-size: 11px; color: var(--text-dim); }
.user-row-stats { font-size: 10px; color: var(--text-muted); }

.timeline-panel { flex: 1; overflow-y: auto; }
.tweet-card {
    padding: 14px 16px; border-bottom: 1px solid var(--border);
    display: flex; gap: 10px; transition: background 0.1s;
}
.tweet-card:hover { background: var(--card-hover); }
.tweet-avatar {
    width: 40px; height: 40px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; font-weight: 700; color: #fff; flex-shrink: 0;
}
.tweet-body { flex: 1; min-width: 0; }
.tweet-header { display: flex; align-items: center; gap: 4px; flex-wrap: wrap; margin-bottom: 4px; }
.tweet-name { font-weight: 700; font-size: 14px; }
.tweet-handle, .tweet-time { font-size: 13px; color: var(--text-dim); }
.tweet-dot { color: var(--text-muted); margin: 0 2px; }
.tweet-text { font-size: 14px; line-height: 1.55; word-wrap: break-word; white-space: pre-wrap; }
.tweet-text a { color: var(--accent); word-break: break-all; }

.tweet-media-wrap { margin-top: 10px; }
.single-media { border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border); cursor: pointer; }
.single-media img { width: 100%; max-height: 400px; object-fit: contain; display: block; background: #000; }
.single-media video { width: 100%; max-height: 400px; display: block; background: #000; object-fit: contain; }
.single-media img.error, .single-media video.error { display: none; }

.media-grid { display: grid; gap: 2px; border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border); }
.media-grid.g1 { grid-template-columns: 1fr; }
.media-grid.g2 { grid-template-columns: 1fr 1fr; }
.media-grid.g3 { grid-template-columns: 1fr 1fr 1fr; }
.media-cell {
    position: relative; overflow: hidden; cursor: pointer; background: #000; min-height: 120px;
}
.media-cell img, .media-cell video { width: 100%; height: 100%; object-fit: contain; aspect-ratio: 1; display: block; }
.media-cell .vid-tag {
    position: absolute; top: 4px; left: 4px; background: rgba(0,0,0,0.7);
    color: #fff; font-size: 10px; padding: 1px 5px; border-radius: 3px; pointer-events: none;
}

.tweet-actions { display: flex; gap: 28px; margin-top: 8px; font-size: 12px; color: var(--text-dim); }
.tweet-actions span { display: flex; align-items: center; gap: 3px; }

/* ===== Global Search ===== */
.global-search-wrap { position: relative; flex: 1; max-width: 520px; }
.global-search-wrap input { width: 100%; max-width: none; }
.search-popover {
    position: absolute; top: 40px; left: 0; width: min(680px, calc(100vw - 120px));
    max-height: min(620px, calc(100vh - 80px)); overflow-y: auto; z-index: 20;
    background: var(--panel); border: 1px solid var(--border-strong);
    border-radius: 10px; box-shadow: 0 18px 60px rgba(0,0,0,0.35);
    display: none; padding: 10px;
}
.search-popover.show { display: block; }
.search-section { padding: 6px 0; border-bottom: 1px solid var(--border); }
.search-section:last-child { border-bottom: none; }
.search-section-title {
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
    color: var(--accent); font-size: 12px; font-weight: 800; padding: 4px 6px 8px;
}
.search-result-row {
    border-radius: 8px; padding: 8px; cursor: pointer; transition: background 0.1s;
}
.search-result-row:hover { background: var(--card-hover); }
.search-result-title { font-size: 13px; color: var(--text); font-weight: 700; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.search-result-meta { font-size: 12px; color: var(--text-dim); margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.search-result-text { font-size: 12px; color: var(--text); line-height: 1.45; margin-top: 3px; max-height: 3.2em; overflow: hidden; }
.search-quick-actions { display: flex; flex-wrap: wrap; gap: 6px; padding: 6px; }
.search-empty { padding: 18px 8px; text-align: center; color: var(--text-dim); font-size: 13px; }


/* ===== Download Tab ===== */
.download-layout { padding: 16px; overflow-y: auto; }
.download-input-row { display: flex; gap: 8px; margin-bottom: 12px; }
.download-input-row input { flex: 1; }
.download-options { display: flex; gap: 16px; margin-bottom: 12px; flex-wrap: wrap; font-size: 13px; }
.download-options label { display: flex; align-items: center; gap: 4px; cursor: pointer; }
.download-actions { display: flex; gap: 8px; margin-bottom: 12px; }
.progress-bar-wrap {
    height: 4px; background: var(--card); border-radius: 2px; margin-bottom: 12px; overflow: hidden;
}
.progress-bar-fill {
    height: 100%; background: var(--accent); transition: width 0.3s; border-radius: 2px;
}
.download-log {
    background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 12px; height: 400px; overflow-y: auto; font-family: var(--font-mono); font-size: 12px;
    line-height: 1.6; white-space: pre-wrap; color: var(--text-dim);
}

/* ===== Timeline Tab ===== */
.timeline-layout { height: 100%; display: flex; flex-direction: column; overflow: hidden; }
.timeline-toolbar {
    display: flex; align-items: center; gap: 10px; padding: 12px 16px;
    border-bottom: 1px solid var(--border); background: var(--panel);
}
.timeline-toolbar input {
    flex: 1; min-width: 180px; height: 34px; border: 1px solid var(--border);
    border-radius: 999px; background: var(--card); color: var(--text);
    padding: 0 14px; outline: none; font-size: 13px;
}
.timeline-toolbar select {
    height: 34px; border: 1px solid var(--border); border-radius: 8px;
    background: var(--card); color: var(--text); padding: 0 8px;
}
.timeline-meta { color: var(--text-dim); font-size: 12px; white-space: nowrap; }
.timeline-list { flex: 1; overflow-y: auto; }
.timeline-item {
    padding: 12px 16px; border-bottom: 1px solid var(--border);
    background: transparent;
}
.timeline-item:hover { background: var(--card-hover); }
.timeline-thumb {
    width: 96px; height: 72px; border-radius: 8px; overflow: hidden;
    border: 1px solid var(--border); background: #000; display: flex;
    align-items: center; justify-content: center; color: var(--text-dim);
    font-size: 11px;
}
.timeline-thumb img, .timeline-thumb video { width: 100%; height: 100%; object-fit: cover; display: block; }
.timeline-body { min-width: 0; }
.timeline-title { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; flex-wrap: wrap; }
.timeline-name { font-weight: 700; font-size: 14px; color: var(--text); }
.timeline-handle, .timeline-time { font-size: 12px; color: var(--text-dim); }
.timeline-text { font-size: 13px; line-height: 1.5; color: var(--text); white-space: pre-wrap; word-break: break-word; }
.timeline-stats { display: flex; gap: 14px; margin-top: 8px; color: var(--text-dim); font-size: 12px; }
.timeline-pager {
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
    padding: 10px 16px; border-top: 1px solid var(--border); background: var(--panel);
}

/* ===== Media Library Tab ===== */
.media-layout { height: 100%; display: flex; flex-direction: column; overflow: hidden; }
.media-toolbar {
    display: flex; align-items: center; gap: 10px; padding: 12px 16px;
    border-bottom: 1px solid var(--border); background: var(--panel);
}
.media-toolbar input {
    flex: 1; min-width: 180px; height: 34px; border: 1px solid var(--border);
    border-radius: 999px; background: var(--card); color: var(--text);
    padding: 0 14px; outline: none; font-size: 13px;
}
.media-toolbar select {
    height: 34px; border: 1px solid var(--border); border-radius: 8px;
    background: var(--card); color: var(--text); padding: 0 8px;
}
.media-library-grid {
    flex: 1; overflow-y: auto; padding: 12px;
    display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 10px; align-content: start;
}
.media-tile {
    border: 1px solid var(--border); border-radius: 8px; overflow: hidden;
    background: var(--card); cursor: pointer; min-width: 0;
}
.media-tile:hover { background: var(--card-hover); }
.media-tile-preview { aspect-ratio: 1; background: #000; display: flex; align-items: center; justify-content: center; }
.media-tile-preview img, .media-tile-preview video { width: 100%; height: 100%; object-fit: cover; display: block; }
.media-tile-info { padding: 8px; font-size: 12px; color: var(--text-dim); line-height: 1.35; }
.media-tile-title { color: var(--text); font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.media-pager {
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
    padding: 10px 16px; border-top: 1px solid var(--border); background: var(--panel);
}
.media-meta { color: var(--text-dim); font-size: 12px; white-space: nowrap; }
@media (max-width: 720px) {
    .timeline-toolbar { flex-wrap: wrap; }
    .timeline-thumb { width: 72px; height: 72px; }
    .media-toolbar { flex-wrap: wrap; }
    .media-library-grid { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); }
}

/* ===== Settings Tab ===== */
.settings-layout { padding: 18px; overflow-y: auto; max-width: 980px; }
.settings-grid { display: grid; grid-template-columns: minmax(0, 1fr) minmax(280px, 340px); gap: 16px; align-items: start; }
.settings-main, .settings-side { min-width: 0; }
.settings-actions { position: sticky; bottom: 0; margin-top: 16px; display: flex; gap: 8px; padding: 12px 0; background: var(--bg); }
.config-status {
    border: 1px solid var(--border); border-radius: 8px; background: var(--card);
    padding: 14px; margin-bottom: 16px;
}
.setup-hero {
    border: 1px solid var(--border); border-radius: 8px; background: var(--panel);
    padding: 18px; margin-bottom: 16px; display: grid;
    grid-template-columns: minmax(0, 1fr) auto; gap: 16px; align-items: center;
}
.setup-hero h2 { font-size: 22px; margin: 0 0 6px; color: var(--text); }
.setup-hero p { color: var(--text-dim); font-size: 13px; line-height: 1.5; }
.setup-steps { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
.setup-step {
    border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px;
    background: var(--card); color: var(--text-dim); font-size: 12px; min-width: 88px;
}
.setup-step strong { display: block; color: var(--text); font-size: 13px; margin-bottom: 2px; }
.config-status-title { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 8px; }
.config-status-title strong { font-size: 15px; }
.status-pill { padding: 3px 8px; border-radius: 999px; font-size: 12px; font-weight: 700; white-space: nowrap; }
.status-pill.ready { background: rgba(81,207,102,0.16); color: var(--green); }
.status-pill.warn { background: rgba(255,212,59,0.16); color: var(--yellow); }
.status-list { margin-top: 8px; display: flex; flex-wrap: wrap; gap: 6px; }
.status-chip {
    border: 1px solid var(--border); border-radius: 999px; padding: 3px 8px;
    color: var(--text-dim); font-size: 12px; background: var(--panel);
}
.field-help { margin-top: 4px; color: var(--text-muted); font-size: 12px; line-height: 1.45; }
.secret-row { display: flex; gap: 8px; align-items: flex-start; }
.secret-row textarea { flex: 1; }
.secret-row input { flex: 1; }
.secret-row .btn { flex: 0 0 auto; padding: 8px 10px; }
@media (max-width: 860px) {
    .home-hero, .home-columns { grid-template-columns: 1fr; }
    .home-grid { grid-template-columns: repeat(2, minmax(120px, 1fr)); }

    .settings-layout { max-width: none; }
}

function getText(key) {
    const pack = APP_TEXT[appLanguage] || APP_TEXT.zh;
    return pack[key] || APP_TEXT.zh[key] || key;
}

function t(key, params) {
    let value = getText(key);
    if (params) {
        Object.keys(params).forEach(k => {
            value = value.replaceAll('{' + k + '}', params[k]);
        });
    }
    return value;
}

function loadLanguage() {
    try {
        appLanguage = localStorage.getItem('xdl.language') || 'en';
    } catch(e) {
        appLanguage = 'zh';
    }
    if (!APP_TEXT[appLanguage]) appLanguage = 'zh';
}

function updateLanguageUi() {
    document.documentElement.lang = getText('htmlLang');
    document.querySelectorAll('.nav-icon[data-label-key]').forEach(el => {
        const label = getText(el.dataset.labelKey);
        const text = el.querySelector('.nav-label');
        const tooltip = el.querySelector('.tooltip');
        if (text) text.textContent = label;
        if (tooltip) tooltip.textContent = label;
        el.title = label;
    });
    const search = document.getElementById('globalSearch');
    if (search) search.placeholder = getText('globalSearch');
    const toggle = document.getElementById('languageToggle');
    if (toggle) {
        toggle.textContent = getText('languageToggle');
        toggle.title = appLanguage === 'zh' ? '中英文切换' : 'Switch language';
    }
    const title = document.getElementById('headerTitle');
    if (title) title.textContent = getText(currentTab);
    refreshConfigBadge();
}

function toggleLanguage() {
    appLanguage = appLanguage === 'zh' ? 'en' : 'zh';
    try { localStorage.setItem('xdl.language', appLanguage); } catch(e) {}
    updateLanguageUi();
    if (currentTab === 'settings' && window._settingsInited) initSettings();
}

function switchTab(name) {
    if (name === 'search') name = 'timeline';
    currentTab = name;
    document.querySelectorAll('.nav-icon').forEach(el => el.classList.toggle('active', el.dataset.tab === name));
    document.querySelectorAll('.tab-content').forEach(el => el.classList.toggle('active', el.id === 'tab-' + name));
    document.getElementById('headerTitle').textContent = getText(name);
    if (name === 'home' && !window._homeInited) { initHome(); window._homeInited = true; }
    if (name === 'browse' && !window._browseInited) { initBrowse(); window._browseInited = true; }
    if (name === 'download') {
        if (!window._downloadInited) { initDownloadTab(); window._downloadInited = true; }
        refreshDownloadUI();
    }
    if (name === 'timeline') {
        if (!window._timelineInited) { initTimelineTab(); window._timelineInited = true; }
    }
    if (name === 'media') {
        if (!window._mediaInited) { initMediaTab(); window._mediaInited = true; }
    }
    try { localStorage.setItem('xdl.currentTab', name); } catch(e) {}
    if (name === 'settings' && !window._settingsInited) { initSettings(); window._settingsInited = true; }
}

function refreshDownloadUI() {
    safeFetch('/api/download/status').then(r => r.json()).then(s => {
        updateQueuePanel(s);
        const liveStats = document.getElementById('dlLiveStats');
        if (s.running) {
            document.getElementById('btnStopDl').style.display = '';
            document.getElementById('dlProgress').style.width = s.total ? (s.current / s.total * 100) + '%' : '0%';
            const log = document.getElementById('dlLog');
            log.textContent = (s.logs || []).join('\n');
            log.scrollTop = log.scrollHeight;
        }
        if (s.stats) {
            const st = s.stats;
            const media_total = (st.images || 0) + (st.videos || 0);
            if (s.running) {
                liveStats.style.display = '';
                liveStats.innerHTML = renderLiveStats(st, media_total);
            } else {
                liveStats.style.display = 'none';
            }
            document.getElementById('dlStatsResult').innerHTML = renderDownloadStats(st, media_total);
        }
    });
    safeFetch('/api/download/sync_status').then(r => r.json()).then(s => {
        if (!s.running) return;
        document.getElementById('btnSync').disabled = true;
        document.getElementById('btnSync').textContent = t('syncing');
    });
}

function updateQueuePanel(s) {
    const total = s.total || 0;
    const done = s.current || 0;
    const left = Math.max(0, total - done);
    const state = s.running ? t('running') : (total ? t('doneIdle') : t('idle'));
    const qTotal = document.getElementById('qTotal');
    if (!qTotal) return;
    qTotal.textContent = total;
    document.getElementById('qDone').textContent = done;
    document.getElementById('qLeft').textContent = left;
    document.getElementById('qState').textContent = state;
}

function renderLiveStats(st, mediaTotal) {
    return '<span style="color:var(--text-dim)">' + t('processed') + ' </span><b>' + st.users + '</b>'
        + '<span style="color:var(--text-dim)"> ' + t('users') + ' · ' + t('tweetUnit') + ' </span><b style="color:#60a5fa">' + (st.text_tweets||0) + '</b>'
        + '<span style="color:var(--text-dim)"> · ' + t('mediaUnit') + ' </span><b style="color:#a78bfa">' + mediaTotal + '</b>'
        + '<span style="color:var(--text-dim)"> · ' + t('imageUnit') + ' </span><b style="color:#f59e0b">' + (st.images||0) + '</b>';
}

function renderDownloadStats(st, mediaTotal) {
    return '<div style="background:var(--panel-bg);border-radius:8px;padding:14px 16px;border:1px solid var(--border)">'
        + '<div style="font-weight:600;margin-bottom:8px;color:#4ade80">✔ ' + t('downloadComplete') + '</div>'
        + '<table style="border-collapse:collapse;font-size:13px">'
        + '<tr><td style="padding:3px 12px 3px 0;color:var(--text-dim)">' + t('processedUsers') + '</td><td style="font-weight:500">' + st.users + '</td></tr>'
        + '<tr><td style="padding:3px 12px 3px 0;color:var(--text-dim)">' + t('addedImages') + '</td><td style="font-weight:500;color:#f59e0b">' + (st.images || 0) + '</td></tr>'
        + '<tr><td style="padding:3px 12px 3px 0;color:var(--text-dim)">' + t('addedVideos') + '</td><td style="font-weight:500;color:#ef4444">' + (st.videos || 0) + '</td></tr>'
        + '<tr><td style="padding:3px 12px 3px 0;color:var(--text-dim)">' + t('addedMedia') + '</td><td style="font-weight:500;color:#a78bfa">' + mediaTotal + '</td></tr>'
        + '<tr><td style="padding:3px 12px 3px 0;color:var(--text-dim)">' + t('addedTextTweets') + '</td><td style="font-weight:500;color:#60a5fa">' + (st.text_tweets || 0) + '</td></tr>'
        + '</table></div>';
}

function toast(msg, type='success') {
    const t = document.getElementById('toast');
    t.textContent = msg; t.className = 'toast ' + type + ' show';
    clearTimeout(t._timer);
    t._timer = setTimeout(() => t.classList.remove('show'), 2500);
}

function esc(s) {
    const div = document.createElement('div');
    div.textContent = s || '';
    return div.innerHTML;
}

function encUrl(s) {
    if (!s) return '';
    return s.split('/').map(function(p) { return encodeURIComponent(p); }).join('/');
}

function jsEscape(s) {
    return (s || '').replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/"/g, '\\"');
}

function stringToColor(str) {
    let hash = 0;
    for (let i = 0; i < str.length; i++) hash = str.charCodeAt(i) + ((hash << 5) - hash);
    return `hsl(${Math.abs(hash) % 360}, 60%, 48%)`;
}

function formatTime(t) {
    if (!t) return '';
    try {
        const d = new Date(t.replace(' ', 'T') + ':00');
        if (isNaN(d.getTime())) return t;
        const now = new Date(), diff = now - d;
        if (diff < 60000) return t('justNow');
        if (diff < 3600000) return Math.floor(diff/60000) + t('minuteAgo');
        if (diff < 86400000) return Math.floor(diff/3600000) + t('hourAgo');
        const m = d.getMonth() + 1, day = d.getDate();
        if (appLanguage === 'en') return d.toLocaleDateString('en', { month: 'short', day: 'numeric', year: d.getFullYear() === now.getFullYear() ? undefined : 'numeric' });
        if (d.getFullYear() === now.getFullYear()) return m + t('month') + day + t('day');
        return d.getFullYear() + t('year') + m + t('month') + day + t('day');
    } catch(e) { return t; }
}

function linkify(text) {
    if (!text) return '';
    var parts = [];
    var lastIdx = 0;
    text.replace(/(https?:\/\/[^\s<]+)/g, function(match, p1, offset) {
        if (offset > lastIdx) parts.push(esc(text.slice(lastIdx, offset)));
        parts.push('<a href="' + esc(match) + '" target="_blank">' + esc(match) + '</a>');
        lastIdx = offset + match.length;
    });
    if (lastIdx < text.length) parts.push(esc(text.slice(lastIdx)));
    var s = parts.join('');
    s = s.replace(/(^|\s)@(\w+)/g, '$1<a href="https://x.com/$2" target="_blank">@$2</a>');
    return s;
}

function isImage(filename) {
    const f = (filename||'').toLowerCase();
    return f.endsWith('.jpg')||f.endsWith('.jpeg')||f.endsWith('.png')||f.endsWith('.gif')||f.endsWith('.webp');
}
function isVideo(filename) {
    const f = (filename||'').toLowerCase();
    return f.endsWith('.mp4')||f.endsWith('.webm');
}

let lightboxItems = [];
let lightboxIndex = 0;

function setLightboxItems(items, startSrc) {
    lightboxItems = (items || []).filter(Boolean);
    lightboxIndex = Math.max(0, lightboxItems.indexOf(startSrc));
}

function openLightbox(src, items) {
    if (items && items.length) {
        setLightboxItems(items, src);
    } else if (!lightboxItems.length || lightboxItems.indexOf(src) === -1) {
        setLightboxItems([src], src);
    } else {
        lightboxIndex = lightboxItems.indexOf(src);
    }
    const lb = document.getElementById('lightbox');
    const count = lightboxItems.length > 1
        ? '<div style="position:fixed;left:24px;top:18px;color:#fff;background:rgba(0,0,0,0.45);padding:5px 10px;border-radius:999px;font-size:12px;z-index:102">' + (lightboxIndex + 1) + ' / ' + lightboxItems.length + '</div>'
        : '';
    const controls = lightboxItems.length > 1
        ? '<button class="modal-close" style="left:24px;right:auto;top:50%;transform:translateY(-50%)" onclick="event.stopPropagation();lightboxPrev()">&lsaquo;</button><button class="modal-close" style="right:24px;top:50%;transform:translateY(-50%)" onclick="event.stopPropagation();lightboxNext()">&rsaquo;</button>'
        : '';
    if (isVideo(src)) {
        lb.innerHTML = '<button class="modal-close" onclick="event.stopPropagation();closeLightbox()">&times;</button>' + count + controls + '<video src="'+encUrl(src)+'" controls autoplay style="max-width:95vw;max-height:95vh"></video>';
    } else {
        lb.innerHTML = '<button class="modal-close" onclick="event.stopPropagation();closeLightbox()">&times;</button>' + count + controls + '<img src="'+encUrl(src)+'">';
    }
    lb.classList.add('show');
}
function closeLightbox() {
    document.getElementById('lightbox').classList.remove('show');
}

function lightboxPrev() {
    if (!lightboxItems.length) return;
    lightboxIndex = (lightboxIndex - 1 + lightboxItems.length) % lightboxItems.length;
    openLightbox(lightboxItems[lightboxIndex], lightboxItems);
}

function lightboxNext() {
    if (!lightboxItems.length) return;
    lightboxIndex = (lightboxIndex + 1) % lightboxItems.length;
    openLightbox(lightboxItems[lightboxIndex], lightboxItems);
}

document.addEventListener('keydown', function(e) {
    const visible = document.getElementById('lightbox')?.classList.contains('show');
    if (!visible) return;
    if (e.key === 'Escape') closeLightbox();
    if (e.key === 'ArrowLeft') lightboxPrev();
    if (e.key === 'ArrowRight') lightboxNext();
});

document.addEventListener('click', function(e) {

let lastSearchAction = { type: '', at: 0 };

function triggerSearchAction(type, e) {
    if (e) {
        e.preventDefault();
        e.stopPropagation();
    }
    const now = Date.now();
    if (lastSearchAction.type === type && now - lastSearchAction.at < 250) return;
    lastSearchAction = { type: type, at: now };
    if (type === 'timeline') applySearchToTimeline();
    if (type === 'media') applySearchToMedia();
}

function onGlobalSearch() {
    const q = document.getElementById('globalSearch').value.trim();
    const pop = document.getElementById('searchPopover');
    if (!pop) return;
    if (q.length < 2) {
        pop.classList.remove('show');
        pop.innerHTML = '';
        return;
    }
    pop.classList.add('show');
    pop.innerHTML = '<div class="search-empty"><div class="spinner"></div>' + t('searchLoading') + '</div>';
    clearTimeout(window._searchTimer);
    window._searchTimer = setTimeout(() => {
        fetch('/api/search?q=' + encodeURIComponent(q))
            .then(r => r.json())
            .then(data => {
                window._searchCache = data;
                renderGlobalSearchResults(data, q);
            })
            .catch(e => {
                pop.innerHTML = '<div class="search-empty">' + t('searchFailed') + esc(e.message) + '</div>';
            });
    }, 250);
}

function handleGlobalSearchKey(e) {
    if (e.key === 'Enter') {
        e.preventDefault();
        applySearchToTimeline();
    }
    if (e.key === 'Escape') {
        hideSearchPopover();
        e.currentTarget.blur();
    }
}

function hideSearchPopover() {
    const pop = document.getElementById('searchPopover');

}

function focusGlobalSearch() {

function renderTimeline(entries) {
    if (!entries || !entries.length) return '<div class="empty-state">' + t('noContentShort') + '</div>';
    return entries.map(t => {
        const initial = (t.display_name||t.username||'?')[0].toUpperCase();
        const color = stringToColor(t.username||t.display_name);
        const timeStr = formatTime(t.time);
        const text = linkify(t.content);
        const mediaHtml = renderMediaBlock(t.media_items);
        if (t.media_items && t.media_items.length && !text) {
            console.warn('MEDIA TWEET WITH EMPTY TEXT', t.url, 'content=', JSON.stringify(t.content ? t.content.slice(0,50) : ''));
        }
        return `<div class="tweet-card">
            <div class="tweet-avatar" style="background:${color}">${initial}</div>
            <div class="tweet-body">
                <div class="tweet-header">
                    <span class="tweet-name">${esc(t.display_name)}</span>
                    <span class="tweet-handle">${esc(t.username)}</span>
                    <span class="tweet-dot">·</span>
                    <span class="tweet-time">${timeStr}</span>
                </div>
                <div class="tweet-text">${text}</div>
                ${mediaHtml}
                <div class="tweet-actions">
                    <span>💬 ${t.replies||0}</span>
                    <span>🔁 ${t.retweets||0}</span>
                    <span>❤️ ${t.likes||0}</span>
                </div>
            </div>
        </div>`;
    }).join('');
}

function renderMediaBlock(items) {
    if (!items || !items.length) return '';
    if (items.length === 1) {
        const m = items[0];
        if (isVideo(m.media_path)) {
            return `<div class="single-media"><video src="${encUrl(m.media_path)}" controls preload="metadata"></video></div>`;
        }
        return `<div class="single-media" onclick="openLightbox('${encUrl(m.media_path)}')">
            <img src="${encUrl(m.media_path)}" loading="lazy" onerror="this.classList.add('error')">
        </div>`;
    }
    const cols = items.length === 3 ? 3 : 2;
    let html = `<div class="media-grid g${cols}">`;
    for (const m of items) {
        if (isVideo(m.media_path)) {
            html += `<div class="media-cell"><video src="${encUrl(m.media_path)}" controls preload="metadata"></video><span class="vid-tag">▶</span></div>`;
        } else {
            html += `<div class="media-cell" onclick="openLightbox('${encUrl(m.media_path)}')"><img src="${encUrl(m.media_path)}" loading="lazy" onerror="this.parentElement.style.display='none'"></div>`;
        }
    }
    html += '</div>';
    return html;
}

function timelineReset() {
    timelineState = { page: 1, perPage: timelineState.perPage, query: '', media: 'all' };
    const input = document.getElementById('timelineSearch');
    if (input) input.value = '';
    const media = document.getElementById('timelineMediaFilter');
    if (media) media.value = 'all';
    saveTimelineState();
    loadTimeline();
}

function timelineSetPerPage(value) {
    timelineState.perPage = parseInt(value) || 30;
    timelineState.page = 1;
    saveTimelineState();
    loadTimeline();
}

function timelineSetMedia(value) {
    timelineState.media = value || 'all';
    timelineState.page = 1;
    saveTimelineState();
    loadTimeline();
}

function timelinePrev() {
    if (timelineState.page > 1) {
        timelineState.page -= 1;
        saveTimelineState();
        loadTimeline();
    }
}

function timelineNext() {
    timelineState.page += 1;
    saveTimelineState();
    loadTimeline();
}

async function loadTimeline() {
    const list = document.getElementById('timelineList');
    const meta = document.getElementById('timelineMeta');
    const pager = document.getElementById('timelinePagerText');
    if (!list) return;
    list.innerHTML = '<div class="empty-state"><div class="spinner"></div>' + t('loadingTimeline') + '</div>';
    const url = '/api/timeline?page=' + timelineState.page
        + '&per_page=' + timelineState.perPage
        + '&q=' + encodeURIComponent(timelineState.query)
        + '&media=' + encodeURIComponent(timelineState.media || 'all');
    try {
        const r = await fetch(url);
        const data = await r.json();
        timelineState.page = data.page || 1;
        const totalPages = data.total_pages || 1;
        meta.textContent = t('tweetCount', {count: data.total || 0});
        pager.textContent = t('pageOf', {page: timelineState.page, total: totalPages});
        if (!data.items || !data.items.length) {
            list.innerHTML = '<div class="empty-state">' + t('noTweets') + '</div>';
            return;
        }
        list.innerHTML = data.items.map(renderTimelineItem).join('');
    } catch(e) {
        list.innerHTML = '<div class="empty-state">' + t('timelineFailed') + esc(e.message) + '</div>';
    }
}



function renderTimelineItem(item) {
    const media = item.media_items || [];
    const mediaHtml = renderMediaBlock(media);
    const mediaLabel = media.length ? '&#x5a92;&#x4f53; ' + media.length : '&#x7eaf;&#x6587;&#x672c;';
    return '<article class="timeline-item">'
        + '<div class="timeline-body">'
        + '<div class="timeline-title"><span class="timeline-name">' + esc(item.display_name || item.username || '') + '</span>'
        + '<span class="timeline-handle">@' + esc((item.username || '').replace(/^@/, '')) + '</span>'
        + '<span class="timeline-time">' + esc(item.time || '') + '</span>'
        + '<span class="badge badge-tweet">' + mediaLabel + '</span></div>'
        + '<div class="timeline-text">' + esc(item.content || '') + '</div>'
        + mediaHtml
        + '<div class="timeline-stats"><span>&#x559c;&#x6b22; ' + (item.likes || 0) + '</span><span>&#x8f6c;&#x63a8; ' + (item.retweets || 0) + '</span><span>&#x56de;&#x590d; ' + (item.replies || 0) + '</span></div>'
        + '</div>'
        + '</article>';
}

async function saveDownloadSettings() {
    const v = parseInt(document.getElementById('dlConcurrency').value) || 16;
    const val = Math.max(1, Math.min(32, v));
    document.getElementById('dlConcurrency').value = val;
    const raw = document.getElementById('dl_user_list').value;
    const users = raw.split('\n').map(s=>s.trim()).filter(Boolean);
    const payload = {
        user_list: users,
        'download.max_concurrent': val,
        'list_sync.list_id': document.getElementById('dl_list_id').value.trim(),
        'list_sync.list_owner': document.getElementById('dl_list_owner').value.trim(),
        'list_sync.list_slug': document.getElementById('dl_list_slug').value.trim(),
    };
    try {
        const r = await fetch('/api/config', {
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify(payload)
        });
        const d = await r.json();
        if (d.ok) {
            toast(t('settingsSaved'));
        } else {
            toast(t('saveFailedToast'), 'error');
        }
    } catch(e) {
        toast(t('saveFailedToast') + ': ' + e.message, 'error');
    }
}

function updateUserCount() {
    const ta = document.getElementById('dl_user_list');
    if (!ta) return;
    const count = ta.value.split('\n').map(s=>s.trim()).filter(Boolean).length;
    const el = document.getElementById('dlUserCount');
    if (el) el.textContent = '(' + count + ' ' + t('userCount') + ')';
}

async function startDownload() {
    const raw = document.getElementById('dl_user_list').value;
    const users = raw.split('\n').map(s=>s.trim()).filter(Boolean);
    if (!users.length) { toast(t('fillUserList'), 'error'); return; }
    const syncPayload = {
        'list_sync.list_id': document.getElementById('dl_list_id').value.trim(),
        'list_sync.list_owner': document.getElementById('dl_list_owner').value.trim(),
        'list_sync.list_slug': document.getElementById('dl_list_slug').value.trim(),
    };
    fetch('/api/config', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({user_list: users, ...syncPayload})});
    const r = await fetch('/api/download/start', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({users: users})
    });
    const d = await r.json();
    if (d.error) { toast(d.error, 'error'); return; }
    document.getElementById('btnStopDl').style.display = '';
    document.getElementById('dlLog').textContent = '';
    document.getElementById('dlSyncResult').textContent = '';
    document.getElementById('dlStatsResult').innerHTML = '';
    document.getElementById('dlLiveStats').style.display = 'none';
    if (downloadPolling) clearInterval(downloadPolling);
    if (syncPolling) clearInterval(syncPolling);
    downloadPolling = setInterval(pollDownloadStatus, 1000);
    toast(t('downloadStarted'));
}

let syncPolling = null;
let syncLogCount = 0;

async function startSync() {
    const btn = document.getElementById('btnSync');
    const listId = document.getElementById('dl_list_id').value.trim();
    if (!listId) { toast(t('fillListId'), 'error'); return; }
    btn.disabled = true;
    btn.textContent = t('syncing');
    const syncPayload = {
        'list_sync.list_id': listId,
        'list_sync.list_owner': document.getElementById('dl_list_owner').value.trim(),
        'list_sync.list_slug': document.getElementById('dl_list_slug').value.trim(),
    };
    fetch('/api/config', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(syncPayload)});
    try {
        const r = await fetch('/api/download/sync', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({list_id: listId})
        });
        const d = await r.json();
        if (d.error) { toast(d.error, 'error'); btn.disabled = false; btn.textContent = t('syncList'); return; }
    } catch(e) {
        toast(t('syncRequestFailed') + e.message, 'error');
        btn.disabled = false;
        btn.textContent = t('syncList');
        return;
    }
    document.getElementById('dlLog').textContent += '\n' + t('listSyncHeader') + '\n';
    document.getElementById('dlSyncResult').textContent = '';
    document.getElementById('dlProgress').style.width = '0%';
    syncLogCount = 0;
    if (syncPolling) clearInterval(syncPolling);
    if (downloadPolling) clearInterval(downloadPolling);
    syncPolling = setInterval(pollSyncStatus, 1000);
    toast(t('syncStarted'));
}

function pollSyncStatus() {
    safeFetch('/api/download/sync_status').then(r=>r.json()).then(s => {
        const btn = document.getElementById('btnSync');
        const log = document.getElementById('dlLog');
        const allLogs = s.logs||[];
        if (allLogs.length > syncLogCount) {
            log.textContent += allLogs.slice(syncLogCount).join('\n') + '\n';
            syncLogCount = allLogs.length;
        }
        log.scrollTop = log.scrollHeight;
        if (!s.running) {
            clearInterval(syncPolling);
            syncPolling = null;
            syncLogCount = 0;
            if (btn) { btn.disabled = false; btn.textContent = t('syncList'); }
            const result = document.getElementById('dlSyncResult');
            const nu = s.new_users||[];
            if (nu.length) {
                result.innerHTML = '<span style="color:#4ade80">✔ ' + t('syncCompleteAdded', {count: nu.length}) + '</span><br><span style="font-size:12px">' + nu.map(u=>'@'+esc(u)).join(', ') + '</span>';
                toast(t('syncCompleteAdded', {count: nu.length}));
                fetch('/api/config').then(r=>r.json()).then(cfg => {
                    const ta = document.getElementById('dl_user_list');
                    if (ta) { ta.value = (cfg.user_list||[]).join('\n'); updateUserCount(); }
                });
            } else if (s.total_members) {
                result.innerHTML = '<span style="color:var(--text-dim)">✔ ' + t('syncCompleteNoNew', {count: s.total_members}) + '</span>';
                toast(t('syncCompleteNoNewToast'));
            } else {
                result.textContent = t('syncComplete');
                toast(t('syncComplete'));
            }
        }
    });
}

function stopDownload() {
    fetch('/api/download/stop', {method:'POST'});
}

function pollDownloadStatus() {
    safeFetch('/api/download/status').then(r => r.json()).then(s => {
        updateQueuePanel(s);
        document.getElementById('dlProgress').style.width = s.total ? (s.current/s.total*100)+'%' : '0%';
        const log = document.getElementById('dlLog');
        log.textContent = (s.logs||[]).join('\n');
        log.scrollTop = log.scrollHeight;
        const liveStats = document.getElementById('dlLiveStats');
        if (s.running && s.stats) {
            const st = s.stats;
            const media_total = (st.images||0) + (st.videos||0);
            liveStats.style.display = '';
            liveStats.innerHTML = renderLiveStats(st, media_total);
        }
        if (!s.running) {
            clearInterval(downloadPolling);
            downloadPolling = null;
            document.getElementById('btnStopDl').style.display = 'none';
            const statsEl = document.getElementById('dlStatsResult');
            if (s.stats) {
                liveStats.style.display = 'none';
                const st = s.stats;
                const media_total = (st.images||0) + (st.videos||0);
                statsEl.innerHTML = renderDownloadStats(st, media_total);
            }
            toast(t('downloadComplete'));
        }
    });
}

function clearSecretField(id) {
    var el = document.getElementById(id);
    el.value = '';
    el.focus();
}

async function pickSavePath() {
    var input = document.getElementById('cfg_save_path');
    if (!input) return;
    try {
        var response = await fetch('/api/dialog/directory', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({initial_dir: input.value.trim()})
        });
        var data = await response.json();
        if (data.ok && data.path) {
            input.value = data.path;
            input.focus();
        }
    } catch(e) {
        toast(plainZh('chooseFolderFailed'), 'error');
    }
}

function renderConfigStatus(status) {
    var box = document.getElementById('cfgStatus');
    if (!box) return;
    var missing = status.missing || [];
    var warnings = status.warnings || [];
    var chips = missing.concat(warnings).map(function(k) {
        return '<span class="status-chip">' + configLabel(k) + '</span>';
    }).join('');
    var pill = status.ready ? '<span class="status-pill ready">' + zh('ready') + '</span>' : '<span class="status-pill warn">' + zh('needConfig') + '</span>';
    box.innerHTML = '<div class="config-status-title"><strong>' + zh('status') + '</strong>' + pill + '</div>'
        + '<div class="field-help">' + zh('currentUsers') + (status.user_count || 0) + '&#x3002;' + zh('savePath') + (status.save_path_exists ? zh('pathExists') : zh('pathUnknown')) + '</div>'
        + (chips ? '<div class="status-list">' + chips + '</div>' : '');
}

async function checkConfigNow() {
    const r = await fetch('/api/config/status');
    const status = await r.json();
    renderConfigStatus(status);
    refreshConfigBadge();
    toast(status.ready ? plainZh('configPassed') : plainZh('configMissing'), status.ready ? 'success' : 'error');
}

function readUserListFromSettings() {
    return readLinesFromField('cfg_user_list');
}

function readLinesFromField(id) {
    return document.getElementById(id).value.split('\n').map(function(s) {
        return s.trim().replace(/^@/, '');
    }).filter(Boolean);
}

function setTimeRangeControls(value) {
    var parts = (value || '2015-01-01:2030-01-01').split(':');
    document.getElementById('cfg_time_start').value = parts[0] || '2015-01-01';
    document.getElementById('cfg_time_end').value = parts[1] || '2030-01-01';
}

function buildTimeRange() {
    var start = document.getElementById('cfg_time_start').value || '2015-01-01';
    var end = document.getElementById('cfg_time_end').value || '2030-01-01';
    if (start > end) {
        var tmp = start;
        start = end;
        end = tmp;
        document.getElementById('cfg_time_start').value = start;
        document.getElementById('cfg_time_end').value = end;
    }
    return start + ':' + end;
}

        'tag_search.tag': document.getElementById('cfg_tag_search_tag').value.trim(),
        'tag_search.filter': document.getElementById('cfg_tag_search_filter').value.trim(),
        'tag_search.download_count': Math.max(1, parseInt(document.getElementById('cfg_tag_search_count').value) || 100),
        'tag_search.media_latest': document.getElementById('cfg_tag_search_media_latest').value === 'true',
        'tag_search.text_mode': document.getElementById('cfg_tag_search_text_mode').value === 'true',
        'text_download.user_list': readLinesFromField('cfg_text_user_list'),
        'text_download.max_tweets': Math.max(0, parseInt(document.getElementById('cfg_text_max_tweets').value) || 0),
        'text_download.request_delay': Math.max(0, parseFloat(document.getElementById('cfg_text_request_delay').value) || 0),
        'text_download.max_retries': Math.max(0, parseInt(document.getElementById('cfg_text_max_retries').value) || 0),
        'retry.max_user_retries': parseInt(document.getElementById('cfg_max_user_retries').value) || 3,
        'retry.delay_seconds': parseInt(document.getElementById('cfg_retry_delay').value) || 10,
        'logging.verbose': document.getElementById('cfg_verbose').value === 'true',
        'logging.log_file': document.getElementById('cfg_log_file').value.trim(),
        theme: document.getElementById('cfg_theme').value
    };
    try {
        var r = await fetch('/api/config', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload)});
        var d = await r.json();
        if (!d.ok) {
            toast(plainZh('saveFailed'), 'error');
            return;
        }
        document.documentElement.dataset.theme = document.getElementById('cfg_theme').value;
        window._downloadInited = false;
        loadStats();
        refreshConfigBadge();
        var sr = await fetch('/api/config/status');
        renderConfigStatus(await sr.json());
        toast(plainZh('saved'));
    } catch(e) {
        toast(plainZh('saveFailed') + ': ' + e.message, 'error');
    }
}

function startApp() {
    loadLanguage();
    updateLanguageUi();
    loadStats();
    setInterval(loadStats, 60000);
    let initialTab = 'home';
    try { initialTab = localStorage.getItem('xdl.currentTab') || 'home'; } catch(e) {}
    switchTab(initialTab);
    checkInitialConfig();
    refreshConfigBadge();
    setInterval(refreshConfigBadge, 60000);
}

startApp();

</script>
</body>
</html>
